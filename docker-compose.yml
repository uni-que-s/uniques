services:
  server:
    build: ./server
    environment:
      - QV_DB_PATH=/app/data/quantumvault.db
    volumes:
      - qv-data:/app/data
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build: ./web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  qv-data:
