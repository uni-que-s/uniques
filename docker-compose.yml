services:
  server:
    build: ./server
    environment:
      - QV_DB_PATH=/app/data/quantumvault.db
      # On-prem license key. Leave unset for the 30-day trial; set it (or pass
      # QV_LICENSE in your shell / .env) to license the platform headlessly.
      - QV_LICENSE=${QV_LICENSE:-}
      # API is same-origin behind nginx, so allow-any is safe by default. If you
      # expose port 4000 directly, lock it down to your dashboard origin(s):
      # - QV_CORS_ORIGIN=https://app.quantumvault.example
    volumes:
      - qv-data:/app/data
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build: ./web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  qv-data:
