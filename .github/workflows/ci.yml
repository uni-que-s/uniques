name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Unit tests
        run: npm test

  web:
    name: Web — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Type-check & build
        run: npm run build

  docker:
    name: Docker stack — build & integration smoke-test
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v6

      # Build both images via compose — this is the real deployment artifact.
      - name: Build images
        run: docker compose build

      - name: Start the stack
        run: docker compose up -d

      - name: Smoke-test the running stack
        run: |
          # 1) Web tier serves the SPA shell.
          ok=""
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/ | grep -qi "<!doctype html"; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "::error::web did not serve index.html"; exit 1; }
          echo "web: index.html served"

          # 2) API reachable directly on the server container.
          ok=""
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:4000/api/health | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "::error::server /api/health not healthy"; exit 1; }
          echo "server: /api/health ok (direct)"

          # 3) API reachable THROUGH the nginx proxy — validates the /api/ proxy_pass
          #    and that the web tier resolves the 'server' host on the compose network.
          ok=""
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/api/health | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "::error::nginx did not proxy /api to the server"; exit 1; }
          echo "web -> server proxy: /api/health ok"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: [server, web, docker]
    # Only publish from main on a push — never from PRs or feature branches.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server image metadata
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/quantumvault-server
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Web image metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/quantumvault-web
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
