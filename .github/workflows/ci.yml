name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Unit tests
        run: npm test

  web:
    name: Web — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Type-check & build
        run: npm run build

  docker:
    name: Docker images — build & smoke-test
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: quantumvault-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          load: true
          tags: quantumvault-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test server container
        run: |
          docker run -d --name qv -p 4000:4000 quantumvault-server:ci
          ok=""
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:4000/api/health; then ok=1; break; fi
            sleep 2
          done
          echo
          docker logs qv
          if [ -z "$ok" ]; then echo "::error::server container never became healthy"; exit 1; fi
          echo "server container healthy"

      - name: Verify web container serves the dashboard
        run: |
          docker run -d --name qvweb -p 8080:80 quantumvault-web:ci
          ok=""
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/ | grep -qi "<!doctype html"; then ok=1; break; fi
            sleep 2
          done
          docker logs qvweb
          if [ -z "$ok" ]; then echo "::error::web container did not serve index.html"; exit 1; fi
          echo "web container healthy"
